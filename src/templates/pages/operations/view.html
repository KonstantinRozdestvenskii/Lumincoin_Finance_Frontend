<main class="main-content flex-grow-1">
    <div class="container-fluid px-4 px-sm-5 py-5">
        <h1 class="mx-2 mb-4 pb-2 mt-5 pt-1 px-1 text-center text-sm-start">Доходы и расходы</h1>
        <div class="d-flex align-items-center ms-2 mb-4 pb-3 ps-1">
            <a href="#/operations/create?target=income" class="btn btn-success me-2">Создать доход</a>
            <a href="#/operations/create?target=expense" class="btn btn-danger">Создать расход</a>
        </div>

        <div class="form w-auto d-flex flex-wrap gap-3 align-items-center justify-content-center justify-content-sm-start mx-2 mb-4 pb-3 px-1">
            <button class="btn btn-outline-secondary" period="today">Сегодня</button>
            <button class="btn btn-outline-secondary" period="week">Неделя</button>
            <button class="btn btn-outline-secondary" period="month">Месяц</button>
            <button class="btn btn-outline-secondary" period="year">Год</button>
            <button class="btn btn-outline-secondary active" period="all">Все</button>
            <button class="btn btn-outline-secondary" period="interval">Интервал</button>
            <div class="d-flex align-items-center gap-3">
                <div>
                    <span class="me-1">с</span>
                    <input type="text" class="date-input border-0 border-bottom border-secondary p-0 text-secondary"
                           placeholder="гггг.мм.дд" id="dateFrom" readonly>
                </div>
                <div>
                    <span class="ms-3 me-1">по</span>
                    <input type="text" class="date-input border-0 border-bottom border-secondary p-0 text-secondary"
                           placeholder="гггг.мм.дд" id="dateTo" readonly>
                </div>
            </div>
        </div>

        <div class="table-responsive mx-2 px-1 mb-5 pb-1">
            <table class="table text-center" id="table">
                <thead>
                <tr>
                    <th scope="col">№ операции</th>
                    <th scope="col">Тип</th>
                    <th scope="col">Категория</th>
                    <th scope="col">Сумма</th>
                    <th scope="col">Дата</th>
                    <th scope="col">Комментарий</th>
                    <th class="operation-column" scope="col"></th>
                </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>
</main>
<div class="popup-container w-100 h-100 position-fixed left-0 top-0 d-flex align-items-center justify-content-center d-none" id="popup">
    <div class="popup popup-operation d-flex flex-column align-items-center justify-content-center bg-white rounded-4">
        <div class="popup-text mb-3 text-center fs-5">Вы действительно хотите удалить операцию?</div>
        <div class="d-flex mt-1">
            <button class="btn btn-success me-2" id="delete-confirmation">Да, удалить</button>
            <button class="btn btn-danger ms-1" id="delete-cancel">Не удалять</button>
        </div>
    </div>
</div>
