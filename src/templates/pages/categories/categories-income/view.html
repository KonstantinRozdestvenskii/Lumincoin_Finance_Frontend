<main class="main-content flex-grow-1">
    <div class="container-fluid px-4 px-sm-5 py-5">
        <h1 class="mb-4 pb-3 mt-5 pt-1 mx-2 px-1 text-center text-sm-start">Доходы</h1>
        <div class="mx-2 px-1 mb-5 pb-1">
            <div class="row justify-content-start row-cols-1 row-cols-lg-2 row-cols-xl-3 gx-3 gy-3">

                <div class="col" id="add-btn">
                    <div class="add-link border rounded-3">
                        <a href="#/categories/income/create"
                           class="h-100 p-3 d-flex align-items-center justify-content-center text-decoration-none">
                            <span class="fs-3">+</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div class="popup-container w-100 h-100 position-fixed left-0 top-0 d-flex align-items-center justify-content-center d-none" id="popup">
    <div class="popup popup-income d-flex flex-column align-items-center justify-content-center bg-white rounded-4">
        <div class="popup-text mb-3 text-center fs-5">Вы действительно хотите удалить категорию? Связанные доходы
            останутся без категории.
        </div>
        <div class="d-flex mt-1">
            <button class="btn btn-success me-2" id="delete-confirmation">Да, удалить</button>
            <button class="btn btn-danger ms-1" id="delete-cancel">Не удалять</button>
        </div>
    </div>

</div>
