<main class="main-content flex-grow-1">
    <div class="container-fluid px-4 px-sm-5 py-5">
        <h1 class="mb-4 pb-3 mt-5 pt-1 mx-2 px-1 text-sm-start">Редактирование категории расходов</h1>
        <form class="form mx-2 px-1 mb-5 pb-1">
            <div class="input-group w-100">
                <input class="form-control" type="text" placeholder="Название..." value="Жильё" id="name">
                <div id="nameFeedback" class="invalid-feedback">
                    Введите название
                </div>
            </div>
            <div class="d-flex flex-wrap align-items-center pt-3 mt-1">
                <button class="btn btn-success me-2" id="save">Сохранить</button>
                <button class="btn btn-danger" id="cancel">Отмена</button>
            </div>
        </form>
    </div>
</main>
